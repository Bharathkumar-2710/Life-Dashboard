{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1e1e2f, #121212);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #2a2a3d;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #00adb5;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00cfc8;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>🔐 Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>

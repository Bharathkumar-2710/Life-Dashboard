<!DOCTYPE html>
<html>
<head>
    <title>Life Dashboard</title>
</head>
<body>

<h1>Life Dashboard</h1>

<!-- ADD TASK -->
<form method="POST" action="/add/">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter task" required>
    <button type="submit">Add Task</button>
</form>

<hr>

<h2>Tasks</h2>

{% for task in tasks %}
    <p>{{ task.title }}</p>
{% empty %}
    <p>No tasks yet</p>
{% endfor %}

</body>
</html>

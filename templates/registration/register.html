{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1e1e2f, #121212);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #2a2a3d;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #00adb5;
            border: none;
            color: white;
            cursor: pointer;
        }

        a {
            color: #00adb5;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📝 Register</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Create Account</button>
    </form>

    <p>Already have an account? <a href="/accounts/login/">Login</a></p>
</div>

</body>
</html>
